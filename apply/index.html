<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Start Your Application | AFD Modelling</title>
    <meta
      name="description"
      content="Start a short private application for the AFD Modelling roster. Takes about 60 seconds."
    />
    <meta property="og:title" content="Start Your Application | AFD Modelling" />
    <meta
      property="og:description"
      content="Send contact details, location, socials, and the modelling work you want to be considered for."
    />
    <meta property="og:type" content="website" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JN998S4FR6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-JN998S4FR6");
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,500;6..96,600&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css?v=lead-form" />
  </head>
  <body class="application-page">
    <a class="skip-link" href="#application-form" data-i18n="skip">Skip to form</a>

    <header class="site-header" aria-label="Application navigation" data-i18n-attr="aria-label:ariaApplicationNav">
      <nav class="nav-shell application-nav">
        <a class="brand" href="../" aria-label="AFD Modelling home" data-i18n-attr="aria-label:ariaHome">
          <svg class="brand-mark" viewBox="0 0 64 64" aria-hidden="true">
            <path d="M17 50 31 14h7l14 36" />
            <path d="M24 34h21" />
            <path d="M15 55h39" />
          </svg>
          <span>
            <strong>AFD</strong>
            <small>Modelling</small>
          </span>
        </a>

        <div class="nav-actions">
          <label class="language-control">
            <span data-i18n="languageLabel">Language</span>
            <select id="language-select" aria-label="Select language" data-i18n-attr="aria-label:languageAria">
              <option value="en">EN</option>
              <option value="th">ไทย</option>
              <option value="tl">Filipino</option>
              <option value="km">ខ្មែរ</option>
              <option value="es">Español</option>
              <option value="ru">Русский</option>
            </select>
          </label>
          <a class="text-link" href="../about/" data-i18n="aboutLink">About</a>
        </div>
      </nav>
    </header>

    <main class="application-shell">
      <section class="application-intro" aria-labelledby="apply-title">
        <p class="kicker" data-i18n="introKicker">First step</p>
        <h1 id="apply-title" data-i18n="introTitle">Start your application.</h1>
      </section>

      <section class="application-panel" aria-label="Application form" data-i18n-attr="aria-label:formAria">
        <form
          id="application-form"
          class="lead-form"
          action="https://docs.google.com/forms/d/e/1FAIpQLSeE1DC8n8UpSep2PqP_bSqdcH5NI6pu5IWo3qezEb0fUZCfqw/formResponse"
          method="POST"
          target="afd-submit-frame"
          novalidate
        >
          <input type="hidden" name="fvv" value="1" />
          <input type="hidden" name="partialResponse" value='[null,null,"-738834209123340570"]' />
          <input type="hidden" name="pageHistory" value="0" />
          <input type="hidden" name="fbzx" value="-738834209123340570" />
          <input type="hidden" name="submissionTimestamp" value="-1" />
          <input type="hidden" name="entry.1042708588" value="Yes" />
          <input type="hidden" name="entry.443918261" value="Not collected on website form" />
          <input type="hidden" name="entry.1062810293" data-location-field />
          <input type="hidden" name="entry.1720834154_sentinel" />

          <div class="field-grid">
            <label class="form-field">
              <span data-i18n="nameLabel">Name *</span>
              <input name="entry.1805060100" autocomplete="name" required />
            </label>

            <label class="form-field">
              <span data-i18n="contactLabel">WhatsApp or Line *</span>
              <input name="entry.1389442767" autocomplete="tel" required />
            </label>

            <label class="form-field">
              <span data-i18n="cityLabel">City *</span>
              <input name="city" autocomplete="address-level2" required />
            </label>

            <label class="form-field">
              <span data-i18n="countryLabel">Country *</span>
              <input name="country" autocomplete="country-name" required />
            </label>

            <label class="form-field">
              <span data-i18n="socialLabel">Instagram, TikTok, or portfolio *</span>
              <input
                name="entry.49493842"
                inputmode="url"
                placeholder="@username or link"
                data-i18n-attr="placeholder:socialPlaceholder"
                required
              />
            </label>
          </div>

          <fieldset class="choice-field" data-work-options>
            <legend data-i18n="workLegend">What work do you want to be considered for? *</legend>
            <label><input type="checkbox" name="entry.1720834154" value="Fashion" /> <span data-i18n="workFashion">Fashion</span></label>
            <label><input type="checkbox" name="entry.1720834154" value="Editorial" /> <span data-i18n="workEditorial">Editorial</span></label>
            <label><input type="checkbox" name="entry.1720834154" value="Social media influencer videos" /> <span data-i18n="workSocial">Social content</span></label>
            <label><input type="checkbox" name="entry.1720834154" value="Swimwear" /> <span data-i18n="workSwimwear">Swimwear</span></label>
          </fieldset>

          <fieldset class="choice-field compact-choice">
            <legend data-i18n="comfortLegend">Comfort on camera *</legend>
            <label><input type="radio" name="entry.1772006111" value="1" required /> 1</label>
            <label><input type="radio" name="entry.1772006111" value="2" /> 2</label>
            <label><input type="radio" name="entry.1772006111" value="3" checked /> 3</label>
            <label><input type="radio" name="entry.1772006111" value="4" /> 4</label>
            <label><input type="radio" name="entry.1772006111" value="5" /> 5</label>
          </fieldset>

          <label class="form-field form-field-wide">
            <span data-i18n="travelLabel">Can you travel for shoots?</span>
            <select name="entry.895753629">
              <option value="Maybe" data-i18n="maybe">Maybe</option>
              <option value="Yes" data-i18n="yes">Yes</option>
              <option value="No" data-i18n="no">No</option>
            </select>
          </label>

          <label class="consent-check">
            <input type="checkbox" name="age_confirmed" required />
            <span data-i18n="consentLabel">I confirm I am 18 or older and AFD may contact me about roster review.</span>
          </label>

          <p class="form-error" id="form-error" role="alert"></p>

          <button class="button form-submit" type="submit" data-i18n="submitButton">Send first application</button>
        </form>

        <div class="form-success" id="form-success" aria-live="polite" tabindex="-1" hidden>
          <p class="kicker" data-i18n="successKicker">Application sent</p>
          <h2 data-i18n="successTitle">We have your first details.</h2>
          <p data-i18n="successText">If your look fits the roster, AFD will contact you privately for the next step.</p>
          <a class="text-link" href="../about/" data-i18n="returnToSite">Return to site</a>
        </div>

        <iframe
          class="submit-frame"
          name="afd-submit-frame"
          title="Application submission"
          data-i18n-attr="title:submitFrameTitle"
        ></iframe>
      </section>
    </main>

    <script src="apply.js?v=lead-form"></script>
  </body>
</html>
